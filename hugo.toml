baseURL = 'https://example.org/'
title = 'HealthTree TW 醫療資訊備份站'
copyright = '版權所有 © 2026 MM 資訊平台 (Healtree Taiwan Connect)'
theme = 'PaperMod'
defaultContentLanguage = 'zh-tw'
hasCJKLanguage = true

pagination.pagerSize = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[languages.zh-tw]
  languageName = "繁體中文"
  weight = 1

[params]
  env = "production"
  description = "多發性骨髓瘤與日常保健國際資訊摘要（靜態備份站）"
  author = "HealthTree TW"
  defaultTheme = "light"
  disableThemeToggle = true

[params.label]
  text = "HealthTree TW"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowRssButtonInSectionTermList = true
  ShowToc = false
  comments = false

[[menu.main]]
  identifier = "home"
  name = "首頁 (HEALTHTREE TW)"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "about-mm"
  name = "認識 MM"
  url = "/categories/know/"
  weight = 20

[[menu.main]]
  identifier = "medical-progress"
  name = "醫療進展"
  url = "/categories/status/"
  weight = 30

[[menu.main]]
  identifier = "daily-health"
  name = "日常保健"
  url = "/categories/life/"
  weight = 40

[[menu.main]]
  identifier = "events"
  name = "活動花絮"
  url = "/categories/event/"
  weight = 50

[[menu.main]]
  identifier = "about-platform"
  name = "關於 MM 資訊平台"
  url = "/about/"
  weight = 60

[taxonomies]
  category = "categories"
  tag = "tags"

[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
