baseURL = 'https://example.org/'
title = 'HealthTree TW 醫療資訊備份站'
theme = 'PaperMod'
defaultContentLanguage = 'zh-tw'
hasCJKLanguage = true

pagination.pagerSize = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[languages.zh-tw]
  languageName = "繁體中文"
  weight = 1

[params]
  env = "production"
  description = "多發性骨髓瘤與日常保健國際資訊摘要（靜態備份站）"
  author = "HealthTree TW"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowRssButtonInSectionTermList = true
  ShowToc = false
  comments = false

[params.homeInfoParams]
  Title = "HealthTree TW"
  Content = "多發性骨髓瘤與日常保健國際資訊摘要。本站為 healthtreetw.org 的靜態備份版本。"

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "分類"
  url = "/categories/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "標籤"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "archives"
  name = "彙整"
  url = "/archives/"
  weight = 40

[taxonomies]
  category = "categories"
  tag = "tags"

[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
